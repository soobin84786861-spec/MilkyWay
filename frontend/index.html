<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>러브버그 위험도 지도</title>
    <meta
      name="description"
      content="서울 전역의 러브버그 출몰 위험도를 실시간으로 확인하세요."
    />
    <link rel="canonical" href="https://lovebugmap.co.kr" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:title" content="러브버그 위험도 지도" />
    <meta
      property="og:description"
      content="서울 전역의 러브버그 출몰 위험도를 실시간으로 확인하세요."
    />
    <meta property="og:image" content="https://lovebugmap.co.kr/og-image.png" />
    <meta property="og:url" content="https://lovebugmap.co.kr" />
    <meta property="og:type" content="website" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />

    <!--
      Kakao Maps SDK는 index.html에서 직접 로드합니다.
      Vite HTML 환경변수 치환을 사용해 로컬 .env 값으로 키를 주입합니다.
    -->
    <script
      type="text/javascript"
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=%VITE_KAKAO_MAP_KEY%&autoload=false"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
